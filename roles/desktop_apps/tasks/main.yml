---
- name: Instalar Flatpak
  apt:
    name: flatpak
    state: present

- name: Adicionar Flathub (system)
  command: >
    flatpak remote-add --if-not-exists --system
    {{ flatpak_remote_name }} {{ flatpak_remote_url }}
  changed_when: false

- name: Garantir keyrings do apt
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Instalar apps desktop via Flatpak com fallback
  include_tasks: install_single_app.yml
  loop: "{{ flatpak_apps }}"
  loop_control:
    loop_var: desktop_app
    label: "{{ desktop_app.id }}"

- name: Validar apps desktop instalados
  shell: |
    if flatpak info --system "{{ item.id }}" >/dev/null 2>&1; then exit 0; fi
    if [ -n "{{ (item.fallback.apt | default('')) if item.fallback is defined else '' }}" ]; then dpkg -s "{{ (item.fallback.apt | default('')) if item.fallback is defined else '' }}" >/dev/null 2>&1 && exit 0; fi
    if [ -n "{{ (item.fallback.apt_package | default('')) if item.fallback is defined else '' }}" ]; then dpkg -s "{{ (item.fallback.apt_package | default('')) if item.fallback is defined else '' }}" >/dev/null 2>&1 && exit 0; fi
    if [ -n "{{ (item.fallback.package_name | default('')) if item.fallback is defined else '' }}" ]; then dpkg -s "{{ (item.fallback.package_name | default('')) if item.fallback is defined else '' }}" >/dev/null 2>&1 && exit 0; fi
    if [ -n "{{ (item.fallback.validate_path | default('')) if item.fallback is defined else '' }}" ] && [ -e "{{ (item.fallback.validate_path | default('')) if item.fallback is defined else '' }}" ]; then exit 0; fi
    exit 1
  args:
    executable: /bin/bash
  register: app_validation
  changed_when: false
  failed_when: false
  loop: "{{ flatpak_apps }}"
  loop_control:
    label: "{{ item.id }}"

- name: Falhar se app desktop nao validado
  fail:
    msg: "Falha ao validar {{ item.item.id }}. Verifique rede/Flathub, repositorios apt/deb ou fallback definido."
  when: item.rc != 0
  loop: "{{ app_validation.results }}"
  loop_control:
    label: "{{ item.item.id }}"

- name: Higienizar duplicidade Flatpak x fallback
  include_tasks: cleanup_single_app.yml
  loop: "{{ flatpak_apps }}"
  loop_control:
    loop_var: cleanup_app
    label: "{{ cleanup_app.id }}"
  when: desktop_apps_cleanup_duplicates | bool
