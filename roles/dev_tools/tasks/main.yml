---
- name: Instalar SDKMAN
  become_user: "{{ dev_user }}"
  shell: curl -s "https://get.sdkman.io" | bash
  args:
    creates: "{{ dev_home }}/.sdkman/bin/sdkman-init.sh"

- name: Instalar Java/Maven/Gradle
  become_user: "{{ dev_user }}"
  shell: |
    source "{{ dev_home }}/.sdkman/bin/sdkman-init.sh"
    sdk install java {{ java_version }}
    sdk install maven
    sdk install gradle
  args: {executable: /bin/bash}

- name: Ativar SDKMAN no Bash
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/40-sdkman.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      if [ -s "$HOME/.sdkman/bin/sdkman-init.sh" ]; then
        source "$HOME/.sdkman/bin/sdkman-init.sh"
      fi

- name: Remover bloco legado do SDKMAN no Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - sdkman"
    state: absent

- name: Instalar NVM
  become_user: "{{ dev_user }}"
  shell: curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  args:
    creates: "{{ dev_home }}/.nvm/nvm.sh"

- name: Instalar Node/Yarn/PNPM/Vue/Vite
  become_user: "{{ dev_user }}"
  shell: |
    export NVM_DIR="{{ dev_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install {{ node_version }}
    nvm alias default {{ node_version }}
    npm install -g yarn pnpm @vue/cli create-vite

- name: Ativar NVM no Bash
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/50-nvm.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      export NVM_DIR="$HOME/.nvm"
      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

- name: Remover bloco legado do NVM no Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - nvm"
    state: absent

- name: Dependências Pyenv
  apt:
    name:
      - python3-venv
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - llvm
      - tk-dev
      - libffi-dev
      - liblzma-dev
      - python3-openssl

- name: Remover pipx para padronizar ferramentas Python com uv
  apt:
    name: pipx
    state: absent
    purge: yes
    autoremove: yes

- name: Verificar uv instalado
  stat:
    path: "{{ dev_home }}/.local/bin/uv"
  register: uv_bin

- name: Instalar uv
  become_user: "{{ dev_user }}"
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    executable: /bin/bash
  environment:
    UV_INSTALL_DIR: "{{ dev_home }}/.local/bin"
    UV_NO_MODIFY_PATH: "1"
  when: not uv_bin.stat.exists

- name: Instalar Pyenv
  become_user: "{{ dev_user }}"
  shell: curl https://pyenv.run | bash
  args:
    creates: "{{ dev_home }}/.pyenv/bin/pyenv"

- name: Instalar Python via Pyenv
  become_user: "{{ dev_user }}"
  shell: |
    export PYENV_ROOT="{{ dev_home }}/.pyenv"
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)"
    pyenv install -s {{ python_version }}
    pyenv global {{ python_version }}
  args: {executable: /bin/bash}

- name: Ativar Pyenv no Bash
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/60-pyenv.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      export PYENV_ROOT="$HOME/.pyenv"
      if [ -d "$PYENV_ROOT/bin" ]; then
        export PATH="$PYENV_ROOT/bin:$PATH"
        eval "$(pyenv init -)"
      fi

- name: Remover bloco legado do Pyenv no Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - pyenv"
    state: absent

- name: Instalar ferramentas Python de desenvolvimento via uv
  become_user: "{{ dev_user }}"
  shell: |
    set -euo pipefail
    export PATH="{{ dev_home }}/.local/bin:$PATH"

    install_or_upgrade_tool() {
      local tool_name="$1"

      if ! uv tool install "$tool_name"; then
        uv tool upgrade "$tool_name"
      fi
    }

    install_or_upgrade_tool pre-commit
    install_or_upgrade_tool yamllint
    install_or_upgrade_tool ansible-lint
  args:
    executable: /bin/bash

- name: Verificar se este repositorio possui .git
  stat:
    path: "{{ playbook_dir }}/.git"
  register: dev_tools_repo_git

- name: Instalar hook local do pre-commit neste repositorio
  become_user: "{{ dev_user }}"
  command: "{{ dev_home }}/.local/bin/pre-commit install"
  args:
    chdir: "{{ playbook_dir }}"
  when: dev_tools_repo_git.stat.exists

- name: Baixar releases do Flutter
  uri:
    url: https://storage.googleapis.com/flutter_infra_release/releases/releases_linux.json
    return_content: yes
  register: flutter_releases
  failed_when: false
  when: flutter_version == "latest"

- name: Validar consulta do Flutter
  fail:
    msg: "Falha ao consultar releases do Flutter. Verifique rede/proxy ou defina flutter_version fixo."
  when: flutter_version == "latest" and (flutter_releases.status is not defined or flutter_releases.status != 200)

- name: Validar flutter_channel
  fail:
    msg: "flutter_channel invalido: {{ flutter_channel }}."
  when: flutter_version == "latest" and flutter_releases.json.current_release[flutter_channel] is not defined

- name: Definir release do Flutter
  set_fact:
    flutter_release: >-
      {{ (flutter_releases.json.releases
          | selectattr('hash', 'equalto', flutter_releases.json.current_release[flutter_channel])
          | list | first) }}
  when: flutter_version == "latest"

- name: Definir versao do Flutter
  set_fact:
    flutter_resolved_version: "{{ flutter_release.version }}"
    flutter_resolved_sha256: "{{ flutter_release.sha256 | default('', true) }}"
  when: flutter_version == "latest"

- name: Definir versao fixa do Flutter
  set_fact:
    flutter_resolved_version: "{{ flutter_version }}"
    flutter_resolved_sha256: ""
  when: flutter_version != "latest"

- name: Verificar versao instalada do Flutter
  command: "{{ flutter_install_dir }}/bin/flutter --version"
  register: flutter_installed
  failed_when: false
  changed_when: false

- name: Extrair versao instalada do Flutter
  set_fact:
    flutter_installed_version: >-
      {{ (flutter_installed.stdout_lines[0].split(' ')[1])
         if flutter_installed.rc == 0 else '' }}

- name: Garantir diretorio de instalacao do Flutter
  file:
    path: "{{ flutter_install_dir | dirname }}"
    state: directory

- name: Criar diretoria temporaria do Flutter
  tempfile:
    state: directory
    suffix: flutter
  register: flutter_tmp
  when: flutter_installed_version != flutter_resolved_version

- name: Remover Flutter anterior
  file:
    path: "{{ flutter_install_dir }}"
    state: absent
  when: flutter_installed_version != "" and flutter_installed_version != flutter_resolved_version

- name: Baixar Flutter
  get_url:
    url: "https://storage.googleapis.com/flutter_infra_release/releases/{{ flutter_channel }}/linux/flutter_linux_{{ flutter_resolved_version }}-{{ flutter_channel }}.tar.xz"
    dest: "{{ flutter_tmp.path }}/flutter.tar.xz"
    checksum: "{{ 'sha256:' ~ flutter_resolved_sha256 if flutter_resolved_sha256 else omit }}"
  when: flutter_installed_version != flutter_resolved_version

- name: Extrair Flutter
  unarchive:
    src: "{{ flutter_tmp.path }}/flutter.tar.xz"
    dest: "{{ flutter_install_dir | dirname }}"
    remote_src: yes
  when: flutter_installed_version != flutter_resolved_version

- name: Limpar temporarios do Flutter
  file:
    path: "{{ flutter_tmp.path }}"
    state: absent
  when: flutter_installed_version != flutter_resolved_version

- name: Exportar PATH do Flutter
  copy:
    dest: /etc/profile.d/flutter.sh
    content: |
      export PATH="{{ flutter_install_dir }}/bin:$PATH"
    mode: "0644"

- name: Validar Flutter
  command: "{{ flutter_install_dir }}/bin/flutter --version"
  register: flutter_check
  changed_when: false
  failed_when: false

- name: Falhar se Flutter nao validar
  fail:
    msg: "Falha ao validar Flutter. Verifique acesso ao storage do Flutter, rede/proxy ou fixe flutter_version."
  when: flutter_check.rc != 0
