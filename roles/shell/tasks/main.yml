---
- name: Validar configuracao obrigatoria do Git
  assert:
    that:
      - git_user_name is defined
      - git_user_email is defined
      - (git_user_name | trim | length) > 0
      - (git_user_email | trim | length) > 0
      - git_user_name != "SEU_NOME"
      - git_user_email != "seu-email@exemplo.com"
    fail_msg: >-
      Defina git_user_name e git_user_email em group_vars/all.yml
      antes de executar o playbook.

- name: Configurar Git
  become_user: "{{ dev_user }}"
  block:
    - command: git config --global user.name "{{ git_user_name }}"
    - command: git config --global user.email "{{ git_user_email }}"
    - command: git config --global init.defaultBranch main

- name: Baixar git-completion
  get_url:
    url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-completion.bash
    dest: /etc/bash_completion.d/git-completion.bash

- name: Instalar bash-git-prompt
  become_user: "{{ dev_user }}"
  git:
    repo: https://github.com/magicmonty/bash-git-prompt.git
    dest: "{{ dev_home }}/.bash-git-prompt"
    depth: 1
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true

- name: Garantir diretorio local de binarios do Chezmoi
  file:
    path: "{{ dev_home }}/.local/bin"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Instalar Chezmoi
  become_user: "{{ dev_user }}"
  shell: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "{{ dev_home }}/.local/bin"
  args:
    creates: "{{ dev_home }}/.local/bin/chezmoi"

- name: Verificar fonte local do Chezmoi no projeto
  stat:
    path: "{{ playbook_dir }}/chezmoi"
  register: chezmoi_local_source

- name: Verificar se repo do Chezmoi foi configurado
  set_fact:
    chezmoi_repo_configured: >-
      {{
        chezmoi_repo is defined
        and (chezmoi_repo | trim | length > 0)
        and ('SEU_REPO_DOTFILES' not in chezmoi_repo)
      }}

- name: Definir modo de aplicacao do Chezmoi
  set_fact:
    chezmoi_apply_mode: >-
      {{
        'repo'
        if chezmoi_repo_configured
        else ('local' if (chezmoi_local_source.stat.isdir | default(false)) else 'none')
      }}

- name: Aplicar dotfiles via repo
  become_user: "{{ dev_user }}"
  shell: "{{ dev_home }}/.local/bin/chezmoi init {{ chezmoi_repo }} --apply"
  when: chezmoi_apply_mode == "repo"
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true

- name: Aplicar dotfiles via fonte local
  become_user: "{{ dev_user }}"
  shell: "{{ dev_home }}/.local/bin/chezmoi init --source {{ playbook_dir }}/chezmoi --apply"
  when: chezmoi_apply_mode == "local"

- name: Avisar quando Chezmoi nao estiver configurado
  debug:
    msg: "Nenhuma fonte do Chezmoi configurada. Defina chezmoi_repo ou crie ./chezmoi para aplicar dotfiles."
  when: chezmoi_apply_mode == "none"

- name: Ativar bash-git-prompt
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    insertafter: EOF
    marker: "# {mark} ANSIBLE MANAGED BLOCK - bash-git-prompt"
    block: |
      if [ -f "$HOME/.bash-git-prompt/gitprompt.sh" ]; then
          GIT_PROMPT_ONLY_IN_REPO=1
          source "$HOME/.bash-git-prompt/gitprompt.sh"
      fi

- name: Garantir diretorio de fontes locais para ferramentas de shell
  file:
    path: "{{ dev_home }}/.local/src"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Baixar ble.sh
  become_user: "{{ dev_user }}"
  git:
    repo: https://github.com/akinomyoga/ble.sh.git
    dest: "{{ dev_home }}/.local/src/ble.sh"
    version: master
    depth: 1
    recursive: yes
    update: yes
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true
  register: blesh_repo

- name: Verificar ble.sh instalado
  stat:
    path: "{{ dev_home }}/.local/share/blesh/ble.sh"
  register: blesh_installed

- name: Instalar ble.sh em ~/.local
  become_user: "{{ dev_user }}"
  shell: make -C "{{ dev_home }}/.local/src/ble.sh" install PREFIX="{{ dev_home }}/.local"
  args:
    executable: /bin/bash
  when: not blesh_installed.stat.exists or blesh_repo.changed

- name: Ativar ble.sh no Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    insertafter: EOF
    marker: "# {mark} ANSIBLE MANAGED BLOCK - ble.sh"
    block: |
      if [ -f "$HOME/.local/share/blesh/ble.sh" ]; then
          source -- "$HOME/.local/share/blesh/ble.sh"
      fi

- name: Instalar thefuck
  apt:
    name:
      - pipx
      - python3-venv
    state: present

- name: Remover thefuck do apt para evitar conflito com Python 3.12
  apt:
    name: thefuck
    state: absent
    purge: yes
    autoremove: yes

- name: Instalar thefuck via pipx
  become_user: "{{ dev_user }}"
  command: pipx install --force thefuck
  environment:
    PIPX_HOME: "{{ dev_home }}/.local/pipx"
    PIPX_BIN_DIR: "{{ dev_home }}/.local/bin"

- name: Ativar thefuck no Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    insertafter: EOF
    marker: "# {mark} ANSIBLE MANAGED BLOCK - thefuck"
    block: |
      if [ -d "$HOME/.local/bin" ]; then
          export PATH="$HOME/.local/bin:$PATH"
      fi
      if [ -x "$HOME/.local/bin/thefuck" ]; then
          eval "$("$HOME/.local/bin/thefuck" --alias)"
      fi

- name: FZF History Search
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    block: |
      {% raw %}
      __fzf_history() {
        local selected=$(history | fzf)
        READLINE_LINE="${selected#* }"
        READLINE_POINT=${#READLINE_LINE}
      }
      bind '"\C-r": "__fzf_history"'
      {% endraw %}
