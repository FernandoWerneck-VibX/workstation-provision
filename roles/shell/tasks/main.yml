---
- name: Validar configuracao obrigatoria do Git
  assert:
    that:
      - git_user_name is defined
      - git_user_email is defined
      - (git_user_name | trim | length) > 0
      - (git_user_email | trim | length) > 0
      - git_user_name != "SEU_NOME"
      - git_user_email != "seu-email@exemplo.com"
    fail_msg: >-
      Defina git_user_name e git_user_email em group_vars/all.yml
      antes de executar o playbook.

- name: Configurar Git
  become_user: "{{ dev_user }}"
  block:
    - command: git config --global user.name "{{ git_user_name }}"
    - command: git config --global user.email "{{ git_user_email }}"
    - command: git config --global init.defaultBranch main
    - command: git config --global core.editor vim

- name: Baixar git-completion
  get_url:
    url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-completion.bash
    dest: /etc/bash_completion.d/git-completion.bash

- name: Instalar bash-git-prompt
  become_user: "{{ dev_user }}"
  git:
    repo: https://github.com/magicmonty/bash-git-prompt.git
    dest: "{{ dev_home }}/.bash-git-prompt"
    depth: 1
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true

- name: Garantir diretorio local de binarios do Chezmoi
  file:
    path: "{{ dev_home }}/.local/bin"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Instalar Chezmoi
  become_user: "{{ dev_user }}"
  shell: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "{{ dev_home }}/.local/bin"
  args:
    creates: "{{ dev_home }}/.local/bin/chezmoi"

- name: Verificar fonte local do Chezmoi no projeto
  stat:
    path: "{{ playbook_dir }}/chezmoi"
  register: chezmoi_local_source

- name: Verificar se repo do Chezmoi foi configurado
  set_fact:
    chezmoi_repo_configured: >-
      {{
        chezmoi_repo is defined
        and (chezmoi_repo | trim | length > 0)
        and ('SEU_REPO_DOTFILES' not in chezmoi_repo)
      }}

- name: Definir modo de aplicacao do Chezmoi
  set_fact:
    chezmoi_apply_mode: >-
      {{
        'repo'
        if chezmoi_repo_configured
        else ('local' if (chezmoi_local_source.stat.isdir | default(false)) else 'none')
      }}

- name: Aplicar dotfiles via repo
  become_user: "{{ dev_user }}"
  shell: "{{ dev_home }}/.local/bin/chezmoi init {{ chezmoi_repo }} --apply"
  when: chezmoi_apply_mode == "repo"
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true

- name: Aplicar dotfiles via fonte local
  become_user: "{{ dev_user }}"
  shell: "{{ dev_home }}/.local/bin/chezmoi init --source {{ playbook_dir }}/chezmoi --apply"
  when: chezmoi_apply_mode == "local"

- name: Avisar quando Chezmoi nao estiver configurado
  debug:
    msg: "Nenhuma fonte do Chezmoi configurada. Defina chezmoi_repo ou crie ./chezmoi para aplicar dotfiles."
  when: chezmoi_apply_mode == "none"

- name: Ativar bash-git-prompt
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/20-bash-git-prompt.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      if [ -f "$HOME/.bash-git-prompt/gitprompt.sh" ]; then
        GIT_PROMPT_ONLY_IN_REPO=1
        source "$HOME/.bash-git-prompt/gitprompt.sh"
      fi

- name: Remover bloco legado do bash-git-prompt do Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - bash-git-prompt"
    state: absent

- name: Garantir diretorio de fontes locais para ferramentas de shell
  file:
    path: "{{ dev_home }}/.local/src"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"

- name: Baixar ble.sh
  become_user: "{{ dev_user }}"
  git:
    repo: https://github.com/akinomyoga/ble.sh.git
    dest: "{{ dev_home }}/.local/src/ble.sh"
    version: master
    depth: 1
    recursive: yes
    update: yes
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true
  register: blesh_repo

- name: Verificar ble.sh instalado
  stat:
    path: "{{ dev_home }}/.local/share/blesh/ble.sh"
  register: blesh_installed

- name: Instalar ble.sh em ~/.local
  become_user: "{{ dev_user }}"
  shell: make -C "{{ dev_home }}/.local/src/ble.sh" install PREFIX="{{ dev_home }}/.local"
  args:
    executable: /bin/bash
  when: not blesh_installed.stat.exists or blesh_repo.changed

- name: Ativar ble.sh no Bash
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/30-ble.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      if [ -f "$HOME/.local/share/blesh/ble.sh" ]; then
        source -- "$HOME/.local/share/blesh/ble.sh"
      fi

- name: Remover bloco legado do ble.sh do Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - ble.sh"
    state: absent

- name: Definir arquitetura deb do pay-respects
  set_fact:
    pay_respects_deb_arch: >-
      {{
        'amd64' if ansible_architecture == 'x86_64'
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else 'armhf' if ansible_architecture in ['armv7l', 'armv7']
        else 'i386' if ansible_architecture in ['i386', 'i686']
        else ansible_architecture
      }}

- name: Definir arquitetura do atuin
  set_fact:
    atuin_release_arch: >-
      {{
        'x86_64-unknown-linux-gnu' if ansible_architecture == 'x86_64'
        else 'aarch64-unknown-linux-gnu' if ansible_architecture in ['aarch64', 'arm64']
        else ''
      }}

- name: Falhar se arquitetura do atuin nao for suportada
  fail:
    msg: "Arquitetura {{ ansible_architecture }} nao suportada para instalacao automatica do atuin."
  when: atuin_release_arch == ''

- name: Consultar release mais recente do atuin
  uri:
    url: https://api.github.com/repos/atuinsh/atuin/releases/latest
    return_content: yes
    headers:
      User-Agent: ansible
  register: atuin_latest
  failed_when: false
  changed_when: false

- name: Falhar se nao conseguir consultar release do atuin
  fail:
    msg: "Falha ao consultar release do atuin no GitHub. Verifique rede/proxy."
  when: atuin_latest.status is not defined or atuin_latest.status != 200

- name: Definir release do atuin
  set_fact:
    atuin_version: "{{ atuin_latest.json.tag_name | regex_replace('^v', '') }}"
    atuin_tarball_url: >-
      {{
        (
          atuin_latest.json.assets
          | selectattr('name', 'equalto', 'atuin-' ~ atuin_release_arch ~ '.tar.gz')
          | map(attribute='browser_download_url')
          | list
          | first
        )
      }}

- name: Falhar se nao houver tarball do atuin para a arquitetura
  fail:
    msg: "Nao foi encontrado tarball do atuin para a arquitetura {{ atuin_release_arch }}."
  when: atuin_tarball_url | default('') | trim == ''

- name: Verificar versao instalada do atuin
  command: "{{ dev_home }}/.local/bin/atuin --version"
  register: atuin_installed
  failed_when: false
  changed_when: false

- name: Extrair versao instalada do atuin
  set_fact:
    atuin_installed_version: "{{ (atuin_installed.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+')) | default('', true) }}"

- name: Criar diretoria temporaria do atuin
  tempfile:
    state: directory
    suffix: atuin
  register: atuin_tmp
  when: atuin_installed_version != atuin_version

- name: Baixar tarball do atuin
  get_url:
    url: "{{ atuin_tarball_url }}"
    dest: "{{ atuin_tmp.path }}/atuin.tar.gz"
  when: atuin_installed_version != atuin_version

- name: Extrair atuin
  unarchive:
    src: "{{ atuin_tmp.path }}/atuin.tar.gz"
    dest: "{{ atuin_tmp.path }}"
    remote_src: yes
  when: atuin_installed_version != atuin_version

- name: Instalar binario do atuin
  copy:
    src: "{{ atuin_tmp.path }}/atuin-{{ atuin_release_arch }}/atuin"
    dest: "{{ dev_home }}/.local/bin/atuin"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
    remote_src: yes
  when: atuin_installed_version != atuin_version

- name: Limpar temporarios do atuin
  file:
    path: "{{ atuin_tmp.path }}"
    state: absent
  when: atuin_installed_version != atuin_version

- name: Ativar atuin no Bash sem sobrescrever o Ctrl+R do fzf
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/75-atuin.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      if command -v atuin >/dev/null 2>&1; then
        eval "$(atuin init bash --disable-ctrl-r)"
      fi

- name: Consultar release mais recente do pay-respects
  uri:
    url: https://api.github.com/repos/iffse/pay-respects/releases/latest
    return_content: yes
    headers:
      User-Agent: ansible
  register: pay_respects_latest
  failed_when: false
  changed_when: false

- name: Falhar se nao conseguir consultar release do pay-respects
  fail:
    msg: "Falha ao consultar release do pay-respects no GitHub. Verifique rede/proxy."
  when: pay_respects_latest.status is not defined or pay_respects_latest.status != 200

- name: Definir release do pay-respects
  set_fact:
    pay_respects_tag: "{{ pay_respects_latest.json.tag_name }}"
    pay_respects_version: "{{ pay_respects_latest.json.tag_name | regex_replace('^v', '') }}"
    pay_respects_deb_url: >-
      {{
        (
          pay_respects_latest.json.assets
          | selectattr('name', 'equalto', 'pay-respects_' ~ (pay_respects_latest.json.tag_name | regex_replace('^v', '')) ~ '-1_' ~ pay_respects_deb_arch ~ '.deb')
          | map(attribute='browser_download_url')
          | list
          | first
        )
      }}

- name: Falhar se nao houver pacote deb do pay-respects para a arquitetura
  fail:
    msg: "Nao foi encontrado pacote .deb do pay-respects para a arquitetura {{ pay_respects_deb_arch }}."
  when: pay_respects_deb_url | default('') | trim == ''

- name: Remover thefuck do apt para evitar conflito com Python 3.12
  apt:
    name: thefuck
    state: absent
    purge: yes
    autoremove: yes

- name: Remover thefuck do uv
  become_user: "{{ dev_user }}"
  command: "{{ dev_home }}/.local/bin/uv tool uninstall thefuck"
  failed_when: false
  changed_when: "'Uninstalled' in (thefuck_uv_remove.stdout | default(''))"
  register: thefuck_uv_remove

- name: Remover arquivos locais remanescentes do thefuck
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ dev_home }}/.local/bin/thefuck"
    - "{{ dev_home }}/.local/pipx/venvs/thefuck"
    - "{{ dev_home }}/.local/share/uv/tools/thefuck"
  failed_when: false

- name: Remover bloco do thefuck do Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - thefuck"
    state: absent

- name: Verificar versao instalada do pay-respects
  command: pay-respects --version
  register: pay_respects_installed
  failed_when: false
  changed_when: false

- name: Extrair versao instalada do pay-respects
  set_fact:
    pay_respects_installed_version: "{{ (pay_respects_installed.stdout | regex_search('[0-9]+\\.[0-9]+\\.[0-9]+')) | default('', true) }}"

- name: Instalar pay-respects via pacote deb oficial
  apt:
    deb: "{{ pay_respects_deb_url }}"
  when: pay_respects_installed_version != pay_respects_version

- name: Ativar pay-respects no Bash
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/70-pay-respects.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      if command -v pay-respects >/dev/null 2>&1; then
        eval "$(pay-respects bash --alias fuck)"
      fi

- name: Remover bloco legado do pay-respects do Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - pay-respects"
    state: absent

- name: FZF History Search
  copy:
    dest: "{{ shell_env_dir | default(dev_home ~ '/.bashrc.d') }}/80-fzf-history.sh"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0644"
    content: |
      __fzf_history() {
        local selected
        selected="$(
          fc -ln 1 \
            | awk '!seen[$0]++' \
            | fzf --tac --height 40% --reverse --query="$READLINE_LINE"
        )"
        if [ -n "$selected" ]; then
          READLINE_LINE="$selected"
          READLINE_POINT=${#READLINE_LINE}
        fi
      }

      bind -x '"\C-r": __fzf_history'

- name: Remover bloco legado do FZF History do Bash
  become_user: "{{ dev_user }}"
  blockinfile:
    path: "{{ dev_home }}/.bashrc"
    state: absent
    block: |
      {% raw %}
      __fzf_history() {
        local selected
        selected="$(
          fc -ln 1 \
            | awk '!seen[$0]++' \
            | fzf --tac --height 40% --reverse --query="$READLINE_LINE"
        )"
        if [ -n "$selected" ]; then
          READLINE_LINE="$selected"
          READLINE_POINT=${#READLINE_LINE}
        fi
      }
      bind -x '"\C-r": __fzf_history'
      {% endraw %}
