---
- name: Validar configuracao obrigatoria do usuario
  assert:
    that:
      - (dev_user | trim | length) > 0
      - dev_user != "root"
    fail_msg: >-
      Nao foi possivel resolver dev_user automaticamente.
      Execute o ansible-playbook com um usuario valido do sistema (nao root).

- name: Detectar se a maquina possui bateria
  find:
    paths: "{{ common_power_supply_path }}"
    patterns: "BAT*"
    file_type: any
  register: common_battery_devices
  failed_when: false
  changed_when: false

- name: Definir estrategia de energia da maquina
  set_fact:
    common_is_notebook: "{{ (common_battery_devices.matched | default(0) | int) > 0 }}"
    common_manage_laptop_power: >-
      {{
        (common_enable_tlp | bool)
        and
        (
          (not (common_tlp_notebook_only | bool))
          or ((common_battery_devices.matched | default(0) | int) > 0)
        )
      }}

- name: Atualizar sistema
  apt:
    update_cache: yes
    cache_valid_time: "{{ apt_cache_valid_time }}"
    upgrade: dist
  when: common_system_upgrade | bool

- name: Instalar pacotes essenciais
  apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - ca-certificates
      - apt-transport-https
      - gzip
      - unzip
      - zip
      - tar
      - htop
      - btop
      - rsync
      - vim
      - rar
      - unrar
      - copyq
      - fzf
      - fd-find
      - ripgrep
      - bat
      - gpg
      - jq
      - gawk
      - libglib2.0-bin
      - bash-completion
      - file
      - software-properties-common
      - fuse3
      - irqbalance
      - systemd-zram-generator
      - kazam

- name: Instalar stack de energia para notebook
  apt:
    name:
      - tlp
    state: present
  when: common_manage_laptop_power

- name: Verificar disponibilidade do tlp-pd
  command: apt-cache show tlp-pd
  register: common_tlp_pd_package
  failed_when: false
  changed_when: false
  when:
    - common_manage_laptop_power
    - common_enable_tlp_pd | bool

- name: Definir disponibilidade do tlp-pd
  set_fact:
    common_tlp_pd_available: >-
      {{
        common_tlp_pd_package.rc == 0
        and (common_tlp_pd_package.stdout | trim | length > 0)
      }}
  when:
    - common_manage_laptop_power
    - common_enable_tlp_pd | bool

- name: Instalar tlp-pd quando disponivel
  apt:
    name: tlp-pd
    state: present
  when:
    - common_manage_laptop_power
    - common_enable_tlp_pd | bool
    - common_tlp_pd_available | default(false)

- name: Remover snapd para manter Snap desativado
  apt:
    name: snapd
    purge: yes
    autoremove: yes
    state: absent

- name: Bloquear reinstalacao de snapd via apt
  copy:
    dest: /etc/apt/preferences.d/nosnap.pref
    mode: "0644"
    content: |
      Package: snapd
      Pin: release a=*
      Pin-Priority: -10

- name: Instalar codecs multimidia no Linux Mint
  apt:
    name: mint-meta-codecs
    state: present
  when: ansible_distribution == "Linux Mint"

- name: Remover GNOME Extension Manager para priorizar Cinnamon Spices
  apt:
    name: gnome-shell-extension-manager
    state: absent
    purge: yes
    autoremove: yes

- name: Remover power-profiles-daemon quando TLP gerencia a energia do notebook
  apt:
    name: power-profiles-daemon
    state: absent
  when: common_manage_laptop_power

- name: Garantir servico power-profiles-daemon parado e desabilitado
  systemd:
    name: power-profiles-daemon
    state: stopped
    enabled: no
  failed_when: false
  when: common_manage_laptop_power

- name: Permitir FUSE allow_other
  lineinfile:
    path: /etc/fuse.conf
    line: "user_allow_other"
    state: present
    create: yes

- name: Otimizar sysctl
  copy:
    dest: /etc/sysctl.d/99-performance.conf
    content: |
      vm.swappiness=5
      vm.vfs_cache_pressure=50
      vm.dirty_background_ratio=2
      vm.dirty_ratio=10
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512

- name: Aplicar parametros do sysctl
  command: sysctl --system
  changed_when: false

- name: Habilitar TRIM periodico
  systemd:
    name: fstrim.timer
    enabled: yes
    state: started

- name: Habilitar irqbalance
  systemd:
    name: irqbalance
    enabled: yes
    state: started

- name: Habilitar TLP
  systemd:
    name: tlp
    enabled: yes
    state: started
  failed_when: false
  when: common_manage_laptop_power

- name: Habilitar tlp-pd quando instalado
  systemd:
    name: tlp-pd
    enabled: yes
    state: started
  failed_when: false
  when:
    - common_manage_laptop_power
    - common_tlp_pd_available | default(false)

- name: Verificar gsettings
  command: which gsettings
  register: gsettings_check
  changed_when: false
  failed_when: false

- name: Reduzir animacoes no Cinnamon e GNOME
  become_user: "{{ dev_user }}"
  shell: gsettings set {{ item.schema }} {{ item.key }} {{ item.value }}
  loop:
    - { schema: "org.cinnamon.desktop.interface", key: "enable-animations", value: "false" }
    - { schema: "org.gnome.desktop.interface", key: "enable-animations", value: "false" }
  loop_control:
    label: "{{ item.schema }} {{ item.key }}"
  when: gsettings_check.rc == 0
  changed_when: false
  failed_when: false

- name: Configurar ZRAM
  copy:
    dest: /etc/systemd/zram-generator.conf
    content: |
      [zram0]
      zram-size = ram / 2
      compression-algorithm = zstd

- name: Recarregar systemd
  systemd:
    daemon_reload: yes

- name: Tentar ativar ZRAM imediatamente
  systemd:
    name: systemd-zram-setup@zram0.service
    state: started
  failed_when: false

- name: Verificar batcat
  stat:
    path: /usr/bin/batcat
  register: batcat_stat

- name: Verificar bat
  stat:
    path: /usr/bin/bat
  register: bat_stat

- name: Criar symlink bat -> batcat
  file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  when: batcat_stat.stat.exists and not bat_stat.stat.exists

- name: Verificar fdfind
  stat:
    path: /usr/bin/fdfind
  register: fdfind_stat

- name: Verificar fd
  stat:
    path: /usr/bin/fd
  register: fd_stat

- name: Criar symlink fd -> fdfind
  file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  when: fdfind_stat.stat.exists and not fd_stat.stat.exists
