---
- name: Validar configuracao obrigatoria do usuario
  assert:
    that:
      - (dev_user | trim | length) > 0
      - dev_user != "root"
    fail_msg: >-
      Nao foi possivel resolver dev_user automaticamente.
      Execute o ansible-playbook com um usuario valido do sistema (nao root).

- name: Atualizar sistema
  apt:
    update_cache: yes
    cache_valid_time: "{{ apt_cache_valid_time }}"
    upgrade: dist

- name: Instalar pacotes essenciais
  apt:
    name:
      - build-essential
      - curl
      - wget
      - git
      - ca-certificates
      - apt-transport-https
      - unzip
      - zip
      - tar
      - htop
      - fzf
      - ripgrep
      - bat
      - gpg
      - jq
      - gawk
      - bash-completion
      - file
      - software-properties-common
      - fuse3
      - irqbalance
      - tlp
      - systemd-zram-generator
      - kazam

- name: Remover snapd para manter Snap desativado
  apt:
    name: snapd
    purge: yes
    autoremove: yes
    state: absent

- name: Bloquear reinstalacao de snapd via apt
  copy:
    dest: /etc/apt/preferences.d/nosnap.pref
    mode: "0644"
    content: |
      Package: snapd
      Pin: release a=*
      Pin-Priority: -10

- name: Instalar codecs multimidia no Linux Mint
  apt:
    name: mint-meta-codecs
    state: present
  when: ansible_distribution == "Linux Mint"

- name: Remover power-profiles-daemon para evitar conflito com TLP
  apt:
    name: power-profiles-daemon
    state: absent

- name: Garantir servico power-profiles-daemon parado e desabilitado
  systemd:
    name: power-profiles-daemon
    state: stopped
    enabled: no
  failed_when: false

- name: Permitir FUSE allow_other
  lineinfile:
    path: /etc/fuse.conf
    line: "user_allow_other"
    state: present
    create: yes

- name: Otimizar sysctl
  copy:
    dest: /etc/sysctl.d/99-performance.conf
    content: |
      vm.swappiness=5
      vm.vfs_cache_pressure=50
      vm.dirty_background_ratio=2
      vm.dirty_ratio=10
      fs.inotify.max_user_watches=524288
      fs.inotify.max_user_instances=512

- name: Aplicar parametros do sysctl
  command: sysctl --system
  changed_when: false

- name: Habilitar TRIM periodico
  systemd:
    name: fstrim.timer
    enabled: yes
    state: started

- name: Habilitar irqbalance
  systemd:
    name: irqbalance
    enabled: yes
    state: started

- name: Habilitar TLP
  systemd:
    name: tlp
    enabled: yes
    state: started
  failed_when: false

- name: Verificar gsettings
  command: which gsettings
  register: gsettings_check
  changed_when: false
  failed_when: false

- name: Reduzir animacoes no Cinnamon e GNOME
  become_user: "{{ dev_user }}"
  shell: gsettings set {{ item.schema }} {{ item.key }} {{ item.value }}
  loop:
    - { schema: "org.cinnamon.desktop.interface", key: "enable-animations", value: "false" }
    - { schema: "org.gnome.desktop.interface", key: "enable-animations", value: "false" }
  loop_control:
    label: "{{ item.schema }} {{ item.key }}"
  when: gsettings_check.rc == 0
  changed_when: false
  failed_when: false

- name: Configurar ZRAM
  copy:
    dest: /etc/systemd/zram-generator.conf
    content: |
      [zram0]
      zram-size = ram / 2
      compression-algorithm = zstd

- name: Recarregar systemd
  systemd:
    daemon_reload: yes

- name: Tentar ativar ZRAM imediatamente
  systemd:
    name: systemd-zram-setup@zram0.service
    state: started
  failed_when: false

- name: Verificar batcat
  stat:
    path: /usr/bin/batcat
  register: batcat_stat

- name: Verificar bat
  stat:
    path: /usr/bin/bat
  register: bat_stat

- name: Criar symlink bat -> batcat
  file:
    src: /usr/bin/batcat
    dest: /usr/local/bin/bat
    state: link
  when: batcat_stat.stat.exists and not bat_stat.stat.exists
