---
- name: Verificar suporte do gsettings para extensoes do Cinnamon
  command: gsettings writable org.cinnamon enabled-extensions
  register: cinnamon_extensions_writable
  changed_when: false
  failed_when: false
  when: cinnamon_enable_gtile | bool

- name: Garantir diretorio de extensoes do Cinnamon
  file:
    path: "{{ dev_home }}/.local/share/cinnamon/extensions"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
  when: cinnamon_enable_gtile | bool

- name: Garantir cache local de fontes do Cinnamon Spices
  file:
    path: "{{ dev_home }}/.local/src"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
  when: cinnamon_enable_gtile | bool

- name: Baixar Cinnamon Spices
  become_user: "{{ dev_user }}"
  git:
    repo: "{{ cinnamon_gtile_repo }}"
    dest: "{{ dev_home }}/.local/src/cinnamon-spices-extensions"
    version: "{{ cinnamon_gtile_repo_version }}"
    update: yes
    depth: 1
  environment:
    GIT_TERMINAL_PROMPT: "0"
    GIT_ASKPASS: /bin/true
  register: cinnamon_spices_repo
  when:
    - cinnamon_enable_gtile | bool
    - cinnamon_extensions_writable.rc == 0
    - cinnamon_extensions_writable.stdout | trim == "true"

- name: Remover instalacao anterior incorreta do gTile
  file:
    path: "{{ dev_home }}/.local/share/cinnamon/extensions/{{ cinnamon_gtile_extension_id }}"
    state: absent
  when:
    - cinnamon_enable_gtile | bool
    - cinnamon_extensions_writable.rc == 0
    - cinnamon_extensions_writable.stdout | trim == "true"

- name: Recriar diretorio do gTile
  file:
    path: "{{ dev_home }}/.local/share/cinnamon/extensions/{{ cinnamon_gtile_extension_id }}"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
  when:
    - cinnamon_enable_gtile | bool
    - cinnamon_extensions_writable.rc == 0
    - cinnamon_extensions_writable.stdout | trim == "true"

- name: Instalar gTile a partir do pacote oficial do Cinnamon Spices
  copy:
    src: "{{ dev_home }}/.local/src/cinnamon-spices-extensions/{{ cinnamon_gtile_extension_id }}/files/{{ cinnamon_gtile_extension_id }}/"
    dest: "{{ dev_home }}/.local/share/cinnamon/extensions/{{ cinnamon_gtile_extension_id }}/"
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: preserve
    remote_src: yes
  when:
    - cinnamon_enable_gtile | bool
    - cinnamon_extensions_writable.rc == 0
    - cinnamon_extensions_writable.stdout | trim == "true"

- name: Habilitar gTile no Cinnamon
  become_user: "{{ dev_user }}"
  shell: |
    set -euo pipefail
    exts="$(gsettings get org.cinnamon enabled-extensions)"

    if echo "$exts" | grep -q "'{{ cinnamon_gtile_extension_id }}'"; then
      echo "already-enabled"
      exit 0
    fi

    if [ "$exts" = "@as []" ] || [ "$exts" = "[]" ]; then
      gsettings set org.cinnamon enabled-extensions "['{{ cinnamon_gtile_extension_id }}']"
    else
      gsettings set org.cinnamon enabled-extensions "${exts%]}, '{{ cinnamon_gtile_extension_id }}']"
    fi

    echo "enabled"
  args:
    executable: /bin/bash
  register: gtile_enable_result
  changed_when: "'enabled' in gtile_enable_result.stdout"
  failed_when: false
  when:
    - cinnamon_enable_gtile | bool
    - cinnamon_extensions_writable.rc == 0
    - cinnamon_extensions_writable.stdout | trim == "true"
