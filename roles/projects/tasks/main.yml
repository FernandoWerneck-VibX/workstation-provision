---
- name: Criar pasta de projetos
  file:
    path: "{{ projects_dir }}"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"

- name: Avisar quando lista de projetos estiver vazia
  debug:
    msg: "Nenhum repositorio em projects_repos. Defina no perfil ativo ou em group_vars/all.yml se quiser clonagem automatica."
  when: projects_repos | length == 0

- name: Garantir subpastas dos projetos
  file:
    path: "{{ projects_dir }}/{{ (item.path | default(item.name)) | dirname }}"
    state: directory
    owner: "{{ dev_user }}"
    group: "{{ dev_user }}"
    mode: "0755"
  loop: "{{ projects_repos }}"
  when:
    - projects_repos | length > 0
    - ((item.path | default(item.name)) | dirname) != "."

- name: Clonar repositórios
  become_user: "{{ dev_user }}"
  git:
    repo: "{{ item.url }}"
    dest: "{{ projects_dir }}/{{ item.path | default(item.name) }}"
    update: no
    accept_hostkey: yes
  loop: "{{ projects_repos }}"
  when: projects_repos | length > 0
