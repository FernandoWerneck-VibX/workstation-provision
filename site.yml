---
- name: Setup Linux Mint (Cinnamon) para desenvolvimento completo
  hosts: local
  become: yes
  roles:
    - common
    - cinnamon
    - shell_env
    - shell
    - dev_tools
    - devops
    - role: openclaw
      when: openclaw_enable | default(true) | bool
    - desktop_apps
    - role: projects
      when: projects_enable | default(true) | bool
    - role: ai_assistant
      when: ai_assistant_enable | default(true) | bool
    - role: syncthing
      when: syncthing_enable | default(true) | bool
    - role: gdrive
      when: gdrive_enable | default(true) | bool
    - cleanup_apps
    - onboarding
